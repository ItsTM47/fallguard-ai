services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_LINE_WEBHOOK_URL: ${VITE_LINE_WEBHOOK_URL:-http://localhost:8787/line-webhook}
        VITE_LINE_RELAY_SECRET: ${VITE_LINE_RELAY_SECRET:-}
        VITE_LLM_ANALYTICS_ENABLED: ${VITE_LLM_ANALYTICS_ENABLED:-true}
        VITE_LLM_ANALYTICS_URL: ${VITE_LLM_ANALYTICS_URL:-http://localhost:8787/analytics/insight}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      relay:
        condition: service_started
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    env_file:
      - .env.local
    environment:
      LINE_RELAY_PORT: "8787"
      LINE_IMAGE_STORAGE_DIR: /app/server/uploads
      MLFLOW_TRACKING_URI: ${DOCKER_MLFLOW_TRACKING_URI:-http://mlflow:5001}
    ports:
      - "${RELAY_PORT:-8787}:8787"
    volumes:
      - relay-uploads:/app/server/uploads
    depends_on:
      mlflow:
        condition: service_started
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    environment:
      MLFLOW_PORT: "5001"
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:-sqlite:////mlflow/mlflow.db}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: ${MLFLOW_DEFAULT_ARTIFACT_ROOT:-/mlflow/artifacts}
      MLFLOW_ALLOWED_HOSTS: ${MLFLOW_ALLOWED_HOSTS:-*}
    ports:
      - "${MLFLOW_PORT:-5001}:5001"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

volumes:
  relay-uploads:
  mlflow-data:
